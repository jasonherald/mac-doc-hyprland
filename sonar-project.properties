# SonarQube project configuration
sonar.projectKey=nwg-dock
sonar.projectName=nwg-dock-hyprland
sonar.projectVersion=0.1.0

# Source code location
sonar.sources=crates
sonar.tests=crates,tests

# Rust source files
sonar.inclusions=**/*.rs

# Exclude non-source files
sonar.exclusions=**/target/**,original/**,tests/fixtures/**,tests/integration/**

# Test file pattern
sonar.test.inclusions=**/*test*.rs,**/tests/**

# Encoding
sonar.sourceEncoding=UTF-8
